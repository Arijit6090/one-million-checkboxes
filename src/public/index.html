<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>One Million Checkboxes</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      input[type="checkbox"] {
        accent-color: #6366f1;
      }
      input[type="checkbox"]:checked {
        background-color: #6366f1;
        border-color: #6366f1;
      }
      .checkbox-grid::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      .checkbox-grid::-webkit-scrollbar-track {
        background: #1f2937;
        border-radius: 5px;
      }
      .checkbox-grid::-webkit-scrollbar-thumb {
        background: #4b5563;
        border-radius: 5px;
      }
      .checkbox-grid::-webkit-scrollbar-thumb:hover {
        background: #6b7280;
      }
      .checkbox-disabled {
        opacity: 0.6;
        cursor: not-allowed !important;
      }
      .login-tooltip {
        display: none;
        position: absolute;
        background: #374151;
        color: white;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 12px;
        z-index: 100;
        white-space: nowrap;
      }
    </style>
  </head>
  <body
    class="min-h-screen bg-gradient-to-br from-gray-950 via-gray-900 to-slate-950 text-gray-100"
  >
    <div class="container mx-auto px-4 py-8 max-w-7xl">
      <header class="text-center mb-8">
        <div class="flex justify-between items-center mb-4">
          <div class="w-48"></div>
          <h1
            class="text-4xl md:text-6xl font-extrabold bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent"
          >
            One Million Checkboxes
          </h1>
          <div id="auth-container" class="w-48 flex justify-end">
            <button
              id="login-btn"
              class="hidden bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition-colors"
            >
              Login
            </button>
            <div id="user-info" class="hidden items-center gap-3">
              <span id="user-name" class="text-gray-300 text-sm"></span>
              <button
                id="logout-btn"
                class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-1.5 rounded-lg text-sm transition-colors"
              >
                Logout
              </button>
            </div>
          </div>
        </div>
        <p class="text-gray-400 text-lg">Click away. We dare you.</p>
        <div class="flex justify-center gap-6 mt-4 text-sm">
          <div
            class="bg-gray-800/50 backdrop-blur px-4 py-2 rounded-lg border border-gray-700/50"
          >
            <span class="text-gray-400">Checked:</span>
            <span id="checked-count" class="font-bold text-indigo-400 ml-1"
              >0</span
            >
          </div>
          <div
            class="bg-gray-800/50 backdrop-blur px-4 py-2 rounded-lg border border-gray-700/50"
          >
            <span class="text-gray-400">Progress:</span>
            <span id="progress" class="font-bold text-purple-400 ml-1">0%</span>
          </div>
        </div>
        <div id="auth-warning" class="hidden mt-4 text-sm text-yellow-400 bg-yellow-900/20 px-4 py-2 rounded-lg">
          Login to interact with checkboxes
        </div>
      </header>

      <div
        class="bg-gray-900/50 backdrop-blur-sm rounded-2xl border border-gray-800/80 shadow-2xl shadow-black/30 overflow-hidden"
      >
        <div
          class="p-3 bg-gray-800/30 border-b border-gray-700/50 flex items-center justify-between"
        >
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-red-500/80"></div>
            <div class="w-3 h-3 rounded-full bg-yellow-500/80"></div>
            <div class="w-3 h-3 rounded-full bg-green-500/80"></div>
          </div>
          <div class="flex gap-2"></div>
        </div>
        <div
          id="checkbox-grid"
          class="checkbox-grid h-[65vh] overflow-auto p-4"
        >
          <div
            id="checkbox-container"
            class="checkbox-container flex flex-wrap justify-center gap-1"
          ></div>
          <div id="loading-indicator" class="text-center py-4 text-gray-400">
            Loading more checkboxes...
          </div>
        </div>
      </div>

      <footer class="text-center mt-6 text-gray-500 text-sm">
        <p>A monument to procrastination</p>
      </footer>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
  </body>
</html>
